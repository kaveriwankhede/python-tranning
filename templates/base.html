
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study Quiz Hub{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
{% with messages = get_flashed_messages() %}
{% if messages %}
<script>
    alert("{{ messages[0] }}");
</script>
{% endif %}
{% endwith %}

<!-- Bootstrap Navbar — replaces old <nav> -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('Home') }}">
            🎓 Study Quiz Hub</i>
        </a>


        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('Home') }}">🏠 Home</a>
            <a class="nav-link" href="{{ url_for('about') }}">ℹ️ about</a>
            <a class="nav-link" href="{{ url_for('students') }}">🧑‍🎓 students</a>

            <a class="nav-link" href="{{ url_for('login') }}">🔐 login</a>
            <a class="nav-link" href="{{ url_for('Register') }}">📝 Register</a>
            <a class="nav-link" href="{{ url_for('filter') }}">🔍 Filter</a>

            <form class="d-flex" action="/search" method="GET">
                <input class="form-control me-2" type="search" placeholder="search" name="q">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<!-- Content wrapper — ADD container mt-4 -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
