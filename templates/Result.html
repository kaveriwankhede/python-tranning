<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result - Study Quiz Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f6f9;
        }

        .result-card{
            max-width:600px;
            margin:80px auto;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        .result-header{
            background-color:#0d6efd;
            color:white;
            padding:20px;
            text-align:center;
            border-radius:15px 15px 0 0;
        }

        .score{
            font-size:50px;
            font-weight:bold;
            color:#198754;
        }
    </style>
</head>
<body>

<div class="card result-card">

    <div class="result-header">
        <h2>Study Quiz Hub</h2>
        <p>Your Quiz Result</p>
    </div>

    <div class="card-body text-center">

        <h3>Congratulations!</h3>

        <p class="score">8 / 10</p>

        <h4>Percentage: 80%</h4>

        <span class="badge bg-success fs-5 mt-2">
            Passed
        </span>

        <hr>

        <p>
            Great job! Keep practicing to improve your skills.
        </p>

        <a href="/" class="btn btn-primary">
            Back to Home
        </a>

        <a href="/quiz" class="btn btn-success">
            Try Again
        </a>

    </div>

</div>

</body>
</html>
